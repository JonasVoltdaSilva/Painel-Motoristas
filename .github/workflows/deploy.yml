name: Deploy no GitHub Pages

on:
  push:
    branches:
      - main

  # Permite rodar manualmente pela aba "Actions" do repositório
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Publicar arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          # Publica a raiz do repositório (onde estão index.html, controle.html, etc.)
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
