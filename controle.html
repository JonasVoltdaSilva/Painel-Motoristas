<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle · Painel de Motoristas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="controle.css" />
</head>
<body class="ctrl-body">

  <!-- ── OVERLAY DE CONFIGURAÇÃO INICIAL ── -->
  <div class="auth-overlay" id="setup-overlay">
    <div class="auth-card">
      <h1>CONFIGURAÇÃO</h1>
      <p class="auth-desc">Primeira vez? Defina as senhas de acesso ao painel.</p>
      <div class="auth-campos">
        <input type="password" id="setup-admin-pass" placeholder="Senha do administrador (dpa)" autocomplete="new-password" />
        <input type="password" id="setup-viewer-pass" placeholder="Senha do visualizador" autocomplete="new-password" />
      </div>
      <p class="auth-erro" id="setup-erro"></p>
      <button class="auth-btn" id="setup-btn" type="button">SALVAR E ENTRAR</button>
      <p class="auth-desc" style="margin-top:14px;font-size:0.62rem">
        Admin: usuário <b style="color:var(--verde)">dpa</b> &nbsp;·&nbsp;
        Visualizador: usuário <b style="color:var(--verde)">visualizar</b>
      </p>
    </div>
  </div>

  <!-- ── OVERLAY DE LOGIN ── -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-card">
      <h1>CONTROLE</h1>
      <p class="auth-desc">Acesso restrito a administradores</p>
      <div class="auth-campos">
        <input type="text" id="auth-usuario" placeholder="Usuário" autocomplete="username" autocapitalize="none" />
        <input type="password" id="auth-senha" placeholder="Senha" autocomplete="current-password" />
      </div>
      <p class="auth-erro" id="auth-erro"></p>
      <button class="auth-btn" id="auth-btn" type="button">ENTRAR</button>
      <a href="index.html" class="auth-voltar">← Voltar ao painel</a>
    </div>
  </div>

  <!-- ── PAINEL DE CONTROLE ── -->
  <main class="ctrl-wrap" id="ctrl-wrap">
    <header class="ctrl-header">
      <div>
        <h1>CONTROLE
          <span class="firebase-dot" id="firebase-dot" title="Sync desconectado"></span>
        </h1>
        <p>Edite os campos — o painel atualiza ao vivo</p>
      </div>
      <div class="ctrl-header-acoes">
        <a href="index.html" class="ctrl-link" target="_blank">↗ Ver painel</a>
        <button class="ctrl-link ctrl-link-warn" id="btn-sair" type="button" title="Sair">⏻</button>
      </div>
    </header>

    <!-- MOTORISTA ATUAL -->
    <section class="ctrl-card">
      <h2>Motorista atual</h2>
      <div class="ctrl-grid">

        <label class="ctrl-field ctrl-field-sm">
          <span>Doca</span>
          <input type="text" id="in-doca" maxlength="3" inputmode="numeric" />
        </label>

        <label class="ctrl-field">
          <span>Status</span>
          <select id="in-status">
            <option>AGUARDANDO MOTORISTA</option>
            <option>CARREGAMENTO</option>
            <option>CARREGAMENTO FINALIZADO</option>
            <option>DESCARREGAMENTO</option>
            <option>DESCARREGAMENTO FINALIZADO</option>
            <option>EM CONFERÊNCIA</option>
            <option>LIBERADO</option>
          </select>
        </label>

        <label class="ctrl-field ctrl-field-wide">
          <span>Nome do motorista</span>
          <input type="text" id="in-motorista" placeholder="Ex: JOÃO SILVA" autocapitalize="characters" />
        </label>

        <label class="ctrl-field">
          <span>Placa</span>
          <input type="text" id="in-placa" placeholder="Ex: ABC-1234" autocapitalize="characters" />
        </label>

        <label class="ctrl-field">
          <span>Veículo (nome / código)</span>
          <input type="text" id="in-veiculo" placeholder="Ex: TRUCK 01" autocapitalize="characters" />
        </label>

        <label class="ctrl-field">
          <span>Tipo</span>
          <select id="in-tipo">
            <option>CARRETA</option>
            <option>TRUCK</option>
            <option>VAN</option>
            <option>BITRUCK</option>
            <option>RODOTREM</option>
            <option>VUC</option>
          </select>
        </label>

        <label class="ctrl-field ctrl-switch">
          <span>Paletizada?</span>
          <div class="switch">
            <input type="checkbox" id="in-paletizada" />
            <span class="slider"></span>
          </div>
        </label>

      </div>
    </section>

    <!-- HISTÓRICO -->
    <section class="ctrl-card">
      <div class="ctrl-card-header">
        <h2>Histórico</h2>
        <button class="btn btn-sm" id="add-historico" type="button">+ Adicionar</button>
      </div>
      <div id="hist-lista" class="hist-lista"></div>
    </section>

    <!-- AÇÕES -->
    <div class="ctrl-acoes">
      <button class="btn btn-ghost" id="resetar" type="button">Resetar dados</button>
      <span class="ctrl-status" id="ctrl-status">Pronto</span>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
  <script>
    // ════════════════════════════════════════════════════
    // AUTH ADMIN
    // ════════════════════════════════════════════════════
    async function tentarLoginAdmin() {
      const usuario = document.getElementById("auth-usuario").value;
      const senha   = document.getElementById("auth-senha").value;
      const err     = document.getElementById("auth-erro");
      const tipo    = await verificarLogin(usuario, senha);
      if (tipo === "admin") {
        salvarSessao("admin");
        document.getElementById("auth-overlay").classList.remove("visivel");
        iniciarControle();
      } else {
        err.textContent = tipo === "viewer" ? "Acesso negado — use credenciais de administrador" : "Usuário ou senha incorretos";
        document.getElementById("auth-senha").value = "";
        document.getElementById("auth-senha").focus();
      }
    }

    function mostrarLogin() {
      document.getElementById("auth-overlay").classList.add("visivel");
      document.getElementById("auth-btn").addEventListener("click", tentarLoginAdmin);
      document.getElementById("auth-usuario").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("auth-senha").focus();
      });
      document.getElementById("auth-senha").addEventListener("keydown", (e) => {
        if (e.key === "Enter") tentarLoginAdmin();
      });
      setTimeout(() => document.getElementById("auth-usuario").focus(), 100);
    }

    function mostrarSetup() {
      document.getElementById("setup-overlay").classList.add("visivel");
      document.getElementById("setup-btn").addEventListener("click", async () => {
        const adminPass  = document.getElementById("setup-admin-pass").value;
        const viewerPass = document.getElementById("setup-viewer-pass").value;
        const err        = document.getElementById("setup-erro");
        if (!adminPass || !viewerPass) { err.textContent = "Preencha as duas senhas"; return; }
        if (adminPass.length < 4 || viewerPass.length < 4) { err.textContent = "Mínimo 4 caracteres por senha"; return; }
        await salvarConfig(adminPass, viewerPass);
        salvarSessao("admin");
        document.getElementById("setup-overlay").classList.remove("visivel");
        iniciarControle();
      });
      document.getElementById("setup-admin-pass").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("setup-viewer-pass").focus();
      });
      document.getElementById("setup-viewer-pass").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("setup-btn").click();
      });
      setTimeout(() => document.getElementById("setup-admin-pass").focus(), 100);
    }

    (function initAuth() {
      if (tipoSessao() === "admin") { iniciarControle(); return; }
      precisaConfigurar().then(needsSetup => needsSetup ? mostrarSetup() : mostrarLogin());
    })();

    // ════════════════════════════════════════════════════
    // CONTROLE
    // ════════════════════════════════════════════════════
    let estado = carregar();

    function iniciarControle() {
      // Indicador Firebase
      if (_firebaseAtivo && firebase?.database) {
        firebase.database().ref(".info/connected").on("value", (snap) => {
          const dot = document.getElementById("firebase-dot");
          if (!dot) return;
          const on = snap.val() === true;
          dot.classList.toggle("on", on);
          dot.title = on ? "Sync ativo" : "Sync desconectado";
        });
      }

      preencher();
      vincularCampos();
      vincularHistorico();
      vincularAcoes();

      inscrever((novo) => { estado = novo; preencher(); });
    }

    // ── Campos principais ──
    const CAMPOS = {
      "in-doca":      "doca",
      "in-status":    "status",
      "in-motorista": "motorista",
      "in-placa":     "placa",
      "in-veiculo":   "veiculo",
      "in-tipo":      "tipo",
    };

    function preencher() {
      Object.entries(CAMPOS).forEach(([id, key]) => {
        const el = document.getElementById(id);
        if (el) el.value = estado[key] || "";
      });
      document.getElementById("in-paletizada").checked = !!estado.paletizada;
      renderHistorico();
    }

    function vincularCampos() {
      Object.entries(CAMPOS).forEach(([id, key]) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("input", () => {
          let v = el.value;
          if (["motorista", "veiculo", "placa"].includes(key)) {
            v = v.toUpperCase();
            el.value = v;
          }
          estado[key] = v;
          salvar(estado);
          sinalizarSalvo();
        });
      });
      document.getElementById("in-paletizada").addEventListener("change", (e) => {
        estado.paletizada = e.target.checked;
        salvar(estado);
        sinalizarSalvo();
      });
    }

    // ── Histórico ──
    function renderHistorico() {
      const cont = document.getElementById("hist-lista");
      cont.innerHTML = (estado.historico || []).map((h, i) => `
        <div class="hist-item">
          <input class="hist-doca"      data-i="${i}" data-k="doca"      value="${h.doca}"      placeholder="01" />
          <input class="hist-motorista" data-i="${i}" data-k="motorista" value="${h.motorista}" placeholder="NOME" />
          <input class="hist-status"    data-i="${i}" data-k="status"    value="${h.status}"    placeholder="STATUS" />
          <button class="hist-rm" data-i="${i}" type="button" title="Remover">×</button>
        </div>
      `).join("");

      cont.querySelectorAll("input").forEach((inp) => {
        inp.addEventListener("input", () => {
          const i = +inp.dataset.i, k = inp.dataset.k;
          let v = inp.value;
          if (k === "motorista" || k === "status") { v = v.toUpperCase(); inp.value = v; }
          estado.historico[i][k] = v;
          salvar(estado);
          sinalizarSalvo();
        });
      });

      cont.querySelectorAll(".hist-rm").forEach((btn) => {
        btn.addEventListener("click", () => {
          estado.historico.splice(+btn.dataset.i, 1);
          salvar(estado);
          renderHistorico();
          sinalizarSalvo();
        });
      });
    }

    function vincularHistorico() {
      document.getElementById("add-historico").addEventListener("click", () => {
        if (!estado.historico) estado.historico = [];
        estado.historico.unshift({ doca: "", motorista: "", status: "AGUARDANDO MOTORISTA" });
        salvar(estado);
        renderHistorico();
        sinalizarSalvo();
      });
    }

    // ── Ações ──
    function vincularAcoes() {
      document.getElementById("resetar").addEventListener("click", () => {
        if (!confirm("Resetar todos os dados?")) return;
        localStorage.removeItem("painel-motoristas:v1");
        estado = carregar();
        salvar(estado);
        preencher();
        sinalizarSalvo();
      });

      document.getElementById("btn-sair").addEventListener("click", () => {
        if (!confirm("Sair da sessão admin?")) return;
        deslogar();
        location.href = "index.html";
      });
    }

    // ── Feedback de salvamento ──
    let _timer;
    function sinalizarSalvo() {
      const el = document.getElementById("ctrl-status");
      el.textContent = "Salvando…";
      el.classList.add("salvando");
      clearTimeout(_timer);
      _timer = setTimeout(() => {
        el.textContent = "Salvo ✓";
        el.classList.remove("salvando");
      }, 500);
    }
  </script>
</body>
</html>
