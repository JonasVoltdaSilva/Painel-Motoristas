<!DOCTYPE html>
<html lang="pt-BR" class="ctrl-page">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle · Painel de Motoristas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="controle.css" />
</head>
<body>

  <!-- ── OVERLAY DE LOGIN ── -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-card">
      <h1>CONTROLE</h1>
      <p class="auth-desc">Acesso restrito a administradores</p>
      <div class="auth-campos">
        <input type="text" id="auth-usuario" placeholder="Usuário" autocomplete="username" autocapitalize="none" />
        <input type="password" id="auth-senha" placeholder="Senha" autocomplete="current-password" />
      </div>
      <p class="auth-erro" id="auth-erro"></p>
      <button class="auth-btn" id="auth-btn" type="button">ENTRAR</button>
      <a href="index.html" class="auth-voltar">← Voltar ao painel</a>
    </div>
  </div>

  <!-- ── PAINEL DE CONTROLE ── -->
  <main class="ctrl-wrap" id="ctrl-wrap">
    <header class="ctrl-header">
      <div>
        <h1>CONTROLE
          <span class="firebase-dot" id="firebase-dot" title="Sync desconectado"></span>
        </h1>
        <p>Selecione a doca, edite os campos e clique em Publicar</p>
      </div>
      <div class="ctrl-header-acoes">
        <a href="index.html" class="ctrl-link" target="_blank">↗ Ver painel</a>
        <button class="ctrl-link ctrl-link-warn" id="btn-sair" type="button" title="Sair">⏻</button>
      </div>
    </header>

    <!-- TABS DE DOCA -->
    <div class="ctrl-tabs" role="tablist" aria-label="Selecionar doca">
      <button class="ctrl-tab active" role="tab" data-doca="1"  aria-selected="true">D1</button>
      <button class="ctrl-tab"        role="tab" data-doca="2"  aria-selected="false">D2</button>
      <button class="ctrl-tab"        role="tab" data-doca="3"  aria-selected="false">D3</button>
      <button class="ctrl-tab"        role="tab" data-doca="4"  aria-selected="false">D4</button>
      <button class="ctrl-tab"        role="tab" data-doca="5"  aria-selected="false">D5</button>
      <button class="ctrl-tab"        role="tab" data-doca="6"  aria-selected="false">D6</button>
      <button class="ctrl-tab"        role="tab" data-doca="7"  aria-selected="false">D7</button>
      <button class="ctrl-tab"        role="tab" data-doca="8"  aria-selected="false">D8</button>
      <button class="ctrl-tab"        role="tab" data-doca="9"  aria-selected="false">D9</button>
      <button class="ctrl-tab"        role="tab" data-doca="10" aria-selected="false">D10</button>
      <button class="ctrl-tab"        role="tab" data-doca="11" aria-selected="false">D11</button>
      <button class="ctrl-tab"        role="tab" data-doca="12" aria-selected="false">D12</button>
    </div>

    <!-- MOTORISTA ATUAL -->
    <section class="ctrl-card">
      <h2 id="titulo-doca">Doca 1 — Motorista atual</h2>
      <div class="ctrl-grid">

        <label class="ctrl-field">
          <span>Status</span>
          <select id="in-status">
            <option>AGUARDANDO MOTORISTA</option>
            <option>CARREGAMENTO</option>
            <option>CARREGAMENTO FINALIZADO</option>
          </select>
        </label>

        <label class="ctrl-field ctrl-field-wide">
          <span>Nome do motorista</span>
          <input type="text" id="in-motorista" placeholder="Ex: JOÃO SILVA" autocapitalize="characters" />
        </label>

        <label class="ctrl-field">
          <span>Placa</span>
          <input type="text" id="in-placa" placeholder="Ex: ABC-1234" autocapitalize="characters" />
        </label>

        <label class="ctrl-field">
          <span>Veículo (nome / código)</span>
          <input type="text" id="in-veiculo" placeholder="Ex: TRUCK 01" autocapitalize="characters" />
        </label>

        <label class="ctrl-field">
          <span>Tipo</span>
          <select id="in-tipo">
            <option>CARRETA</option>
            <option>TRUCK</option>
            <option>VAN</option>
            <option>BITRUCK</option>
            <option>RODOTREM</option>
            <option>VUC</option>
          </select>
        </label>

        <label class="ctrl-field ctrl-switch">
          <span>Paletizada?</span>
          <div class="switch">
            <input type="checkbox" id="in-paletizada" />
            <span class="slider"></span>
          </div>
        </label>

      </div>
    </section>

    <!-- LAYOUT DO PAINEL -->
    <section class="ctrl-card">
      <h2>Layout do painel (docas por tela)</h2>
      <div class="ctrl-layout-btns">
        <button class="ctrl-layout-btn" data-n="2">2</button>
        <button class="ctrl-layout-btn" data-n="4">4</button>
        <button class="ctrl-layout-btn" data-n="6">6</button>
        <button class="ctrl-layout-btn" data-n="8">8</button>
        <button class="ctrl-layout-btn" data-n="12">12</button>
      </div>
    </section>

    <!-- AÇÕES -->
    <div class="ctrl-acoes">
      <button class="btn btn-ghost" id="resetar" type="button">Resetar dados</button>
      <div class="ctrl-publicar-area">
        <span class="ctrl-status" id="ctrl-status">Pronto</span>
        <button class="btn btn-publicar" id="btn-publicar" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
          </svg>
          Publicar na tela
        </button>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
  <script>
    // ════════════════════════════════════════════════════
    // CONTROLE — variáveis globais (devem vir antes de initAuth)
    // ════════════════════════════════════════════════════
    let estado    = carregar();
    let docaAtiva = "1";
    let _timer         = null;
    let _temAlteracoes = false;

    const CAMPOS = {
      "in-status":    "status",
      "in-motorista": "motorista",
      "in-placa":     "placa",
      "in-veiculo":   "veiculo",
      "in-tipo":      "tipo",
    };

    // ════════════════════════════════════════════════════
    // AUTH ADMIN
    // ════════════════════════════════════════════════════
    async function tentarLoginAdmin() {
      const usuario = document.getElementById("auth-usuario").value;
      const senha   = document.getElementById("auth-senha").value;
      const err     = document.getElementById("auth-erro");
      const tipo    = await verificarLogin(usuario, senha);
      if (tipo === "admin") {
        salvarSessao("admin");
        document.getElementById("auth-overlay").classList.remove("visivel");
        iniciarControle();
      } else {
        err.textContent = "Usuário ou senha incorretos";
        document.getElementById("auth-senha").value = "";
        document.getElementById("auth-senha").focus();
      }
    }

    (function initAuth() {
      if (tipoSessao() === "admin") { iniciarControle(); return; }
      document.getElementById("auth-overlay").classList.add("visivel");
      document.getElementById("auth-btn").onclick       = tentarLoginAdmin;
      document.getElementById("auth-usuario").onkeydown = (e) => { if (e.key === "Enter") document.getElementById("auth-senha").focus(); };
      document.getElementById("auth-senha").onkeydown   = (e) => { if (e.key === "Enter") tentarLoginAdmin(); };
      setTimeout(() => document.getElementById("auth-usuario").focus(), 100);
    })();

    function iniciarControle() {
      // Indicador Firebase
      if (_firebaseAtivo && firebase?.database) {
        firebase.database().ref(".info/connected").on("value", (snap) => {
          const dot = document.getElementById("firebase-dot");
          if (!dot) return;
          const on = snap.val() === true;
          dot.classList.toggle("on", on);
          dot.title = on ? "Sync ativo" : "Sync desconectado";
        });
      }

      vincularTabs();
      preencher();
      vincularCampos();
      vincularLayout();
      vincularAcoes();

      inscrever((novo) => { if (!_temAlteracoes) { estado = novo; preencher(); } });
    }

    // ── Tabs de doca ──
    function vincularTabs() {
      document.querySelectorAll(".ctrl-tab").forEach(tab => {
        tab.addEventListener("click", () => {
          docaAtiva = tab.dataset.doca;
          document.querySelectorAll(".ctrl-tab").forEach(t => {
            t.classList.toggle("active", t === tab);
            t.setAttribute("aria-selected", t === tab ? "true" : "false");
          });
          document.getElementById("titulo-doca").textContent = `Doca ${docaAtiva} — Motorista atual`;
          _temAlteracoes = false;
          const cs = document.getElementById("ctrl-status");
          cs.textContent = "Pronto"; cs.className = "ctrl-status";
          preencher();
        });
      });
    }

    function docaAtual() {
      if (!estado.docas) estado.docas = {};
      if (!estado.docas[docaAtiva]) estado.docas[docaAtiva] = { ...DOCA_PADRAO };
      return estado.docas[docaAtiva];
    }

    function preencher() {
      const d = docaAtual();
      Object.entries(CAMPOS).forEach(([id, key]) => {
        const el = document.getElementById(id);
        if (el) el.value = d[key] || "";
      });
      document.getElementById("in-paletizada").checked = !!d.paletizada;
    }

    function vincularCampos() {
      Object.entries(CAMPOS).forEach(([id, key]) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("input", () => {
          let v = el.value;
          if (["motorista", "veiculo", "placa"].includes(key)) {
            v = v.toUpperCase(); el.value = v;
          }
          docaAtual()[key] = v;
          marcarPendente();
        });
      });
      document.getElementById("in-paletizada").addEventListener("change", (e) => {
        docaAtual().paletizada = e.target.checked;
        marcarPendente();
      });
    }

    // ── Layout do painel ──
    function vincularLayout() {
      const LAYOUTS = [2, 4, 6, 8, 12];
      let layoutAtual = parseInt(localStorage.getItem("painel-layout") || "4");
      if (!LAYOUTS.includes(layoutAtual)) layoutAtual = 4;

      function aplicarLayout(n) {
        layoutAtual = n;
        localStorage.setItem("painel-layout", String(n));
        document.querySelectorAll(".ctrl-layout-btn").forEach(b =>
          b.classList.toggle("ativo", Number(b.dataset.n) === n)
        );
        // Notifica TV via BroadcastChannel (mesma origem)
        try {
          const bc = new BroadcastChannel("painel-layout");
          bc.postMessage(n);
          bc.close();
        } catch {}
      }

      document.querySelectorAll(".ctrl-layout-btn").forEach(btn => {
        if (Number(btn.dataset.n) === layoutAtual) btn.classList.add("ativo");
        btn.addEventListener("click", () => aplicarLayout(Number(btn.dataset.n)));
      });
    }

    // ── Ações ──
    function vincularAcoes() {
      document.getElementById("resetar").addEventListener("click", () => {
        if (!confirm("Resetar todos os dados?")) return;
        localStorage.removeItem(STORAGE_KEY);
        estado = carregar();
        salvar(estado);
        preencher();
        sinalizarPublicado();
      });

      document.getElementById("btn-sair").addEventListener("click", () => {
        if (!confirm("Sair da sessão admin?")) return;
        deslogar();
        location.href = "index.html";
      });

      document.getElementById("btn-publicar").addEventListener("click", () => {
        // _publishTs garante que a TV sempre detecta mudança e aciona fullscreen + som
        docaAtual()._publishTs = Date.now();
        salvar(estado);
        sinalizarPublicado();
      });
    }

    // ── Status de edição / publicação ──
    function marcarPendente() {
      _temAlteracoes = true;
      const el = document.getElementById("ctrl-status");
      el.textContent = "● Não publicado";
      el.className   = "ctrl-status pendente";
    }

    function sinalizarPublicado() {
      _temAlteracoes = false;
      const el = document.getElementById("ctrl-status");
      el.textContent = "Publicando…";
      el.className   = "ctrl-status salvando";
      clearTimeout(_timer);
      _timer = setTimeout(() => {
        el.textContent = "✓ Publicado";
        el.className   = "ctrl-status publicado";
        setTimeout(() => {
          if (!_temAlteracoes) {
            el.textContent = "Pronto";
            el.className   = "ctrl-status";
          }
        }, 2500);
      }, 400);
    }
  </script>
</body>
</html>
