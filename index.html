<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Motoristas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="painel">

    <!-- DOCA -->
    <section class="card doca">
      <div class="doca-label">DOCA</div>
      <div class="doca-numero" id="campo-doca">01</div>
    </section>

    <!-- CENTRO -->
    <section class="card centro">
      <div class="status">
        <span class="status-dot"></span>
        <span id="campo-status">CARREGAMENTO FINALIZADO</span>
      </div>

      <div class="motorista-bloco">
        <p class="rotulo">MOTORISTA</p>
        <h1 class="motorista-nome" id="campo-motorista">ARIANA GRANDE</h1>
        <p class="placa" id="campo-placa">6969-ARI</p>
      </div>

      <div class="veiculo-bloco">
        <p class="veiculo-nome" id="campo-veiculo">POP STAR</p>
        <p class="veiculo-tipo" id="campo-tipo">CARRETA &middot; PALETIZADA</p>
      </div>
    </section>

    <!-- HISTÓRICO -->
    <aside class="historico">
      <header class="historico-header">
        <h2>HISTORICO</h2>
        <a href="controle.html" class="edit-btn" aria-label="Abrir controle" title="Abrir controle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        </a>
      </header>

      <ul class="historico-lista" id="campo-historico"></ul>
    </aside>

  </main>

  <script src="script.js"></script>
  <script>
    // ────────── ESCALA PROPORCIONAL ──────────
    // O painel é desenhado em 1920x1080 e escalado uniformemente
    // pra qualquer tela (PC, TV 4K, mobile landscape), mantendo as
    // proporções idênticas em qualquer resolução.
    function aplicarEscala() {
      // só escala em landscape (em portrait usamos layout próprio via CSS)
      const isPortrait = window.matchMedia("(orientation: portrait) and (max-aspect-ratio: 9/10)").matches;
      if (isPortrait) {
        document.documentElement.style.setProperty("--scale", "1");
        return;
      }
      const escala = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      document.documentElement.style.setProperty("--scale", escala);
    }
    aplicarEscala();
    window.addEventListener("resize", aplicarEscala);
    window.addEventListener("orientationchange", aplicarEscala);

    // ────────── RENDER ──────────
    function render(estado) {
      document.getElementById("campo-doca").textContent      = estado.doca;
      document.getElementById("campo-status").textContent    = estado.status;
      document.getElementById("campo-motorista").textContent = estado.motorista;
      document.getElementById("campo-placa").textContent     = estado.placa;
      document.getElementById("campo-veiculo").textContent   = estado.veiculo;

      const sufixo = estado.paletizada ? " · PALETIZADA" : " · NÃO PALETIZADA";
      document.getElementById("campo-tipo").textContent = estado.tipo + sufixo;

      const lista = document.getElementById("campo-historico");
      lista.innerHTML = estado.historico.map((h) => `
        <li class="historico-item">
          <p class="item-doca">Doca ${h.doca}</p>
          <p class="item-info">${h.motorista} – ${h.status}</p>
        </li>
      `).join("");
    }

    // 1. render imediato com o que tem local
    render(carregar());
    // 2. inscrever em mudanças (BroadcastChannel + storage + polling)
    inscrever(render);
    // 3. tentar puxar versão mais nova da nuvem (se já existe sync ID)
    (async () => {
      const remoto = await carregarNuvem();
      if (remoto) {
        salvarLocal(remoto);
        render(remoto);
      }
    })();
  </script>
</body>
</html>
