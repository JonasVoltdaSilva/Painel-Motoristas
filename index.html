<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Motoristas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── OVERLAY DE LOGIN (abre apenas via botão lock) ── -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-card">
      <button class="auth-close" id="auth-close" type="button" aria-label="Fechar">×</button>
      <h1>ACESSO</h1>
      <p class="auth-desc">Entre como administrador para configurar o painel</p>
      <div class="auth-campos">
        <input type="text" id="auth-usuario" placeholder="Usuário" autocomplete="username" autocapitalize="none" />
        <input type="password" id="auth-senha" placeholder="Senha" autocomplete="current-password" />
      </div>
      <p class="auth-erro" id="auth-erro"></p>
      <button class="auth-btn" id="auth-btn" type="button">ENTRAR</button>
    </div>
  </div>

  <!-- ── TV HEADER ── -->
  <header class="tv-header">
    <span class="tv-empresa">DPA</span>
    <div class="tv-indicador" id="tv-indicador" aria-label="Página atual" role="group"></div>
    <time id="relogio-tv" class="tv-relogio" aria-label="Horário atual"></time>
  </header>

  <!-- ── GRID DE DOCAS ── -->
  <main class="dock-grid" id="dock-grid" data-layout="4" aria-label="Status das docas"></main>


  <!-- ── GLOW DE ATUALIZAÇÃO ── -->
  <div class="glow-overlay" id="glow-overlay" aria-hidden="true"></div>

  <!-- ── BOTÃO DISCRETO DE ACESSO ADMIN ── -->
  <button class="btn-lock" id="btn-lock" type="button" aria-label="Acesso administrador" title="Administrador">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </button>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
  <script>
    // ── LAYOUT DE DOCAS (2 / 4 / 6 / 8 / 12 por página) ──
    const LAYOUTS_VALIDOS = [2, 4, 6, 8, 12];
    let _layout     = parseInt(localStorage.getItem("painel-layout") || "4");
    if (!LAYOUTS_VALIDOS.includes(_layout)) _layout = 4;

    let _paginaAtual = 0;
    let _estadoAtual = null;

    function calcularPaginas(n) {
      const todas = [];
      for (let i = 0; i < DOCA_IDS.length; i += n) {
        todas.push(DOCA_IDS.slice(i, i + n));
      }
      return todas;
    }

    let TV_PAGINAS = calcularPaginas(_layout);

    function setLayout(n) {
      _layout     = n;
      TV_PAGINAS  = calcularPaginas(n);
      _paginaAtual = 0;
      localStorage.setItem("painel-layout", String(n));
      document.getElementById("dock-grid").dataset.layout = String(n);
      document.querySelectorAll(".tv-layout-btn").forEach(b =>
        b.classList.toggle("ativo", Number(b.dataset.n) === n)
      );
      if (_estadoAtual) render(_estadoAtual);
    }

    // ── CLASSIFICAR STATUS ──
    function classificarStatus(s) {
      const u = (s || "").toUpperCase();
      if (u.includes("LIBERADO"))                                       return "liberado";
      if (u.includes("FINALIZADO"))                                     return "finalizado";
      if (u.includes("AGUARDANDO"))                                     return "aguardando";
      if (u.includes("CONFERÊNCIA") || u.includes("CONFERENCIA"))      return "conferencia";
      if (u.includes("CARREGAMENTO") || u.includes("DESCARREGAMENTO")) return "carregando";
      return "aguardando";
    }

    // ── FORMATAR HORA ──
    function formatarHora(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
    }

    // ── SOM (ping duplo via Web Audio API) ──
    let _audioCtx = null;

    function _criarCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function _tocarNotas() {
      [[523.25, 0], [783.99, 0.16]].forEach(([freq, delay]) => {
        const osc  = _audioCtx.createOscillator();
        const gain = _audioCtx.createGain();
        osc.connect(gain);
        gain.connect(_audioCtx.destination);
        osc.type = "sine";
        osc.frequency.value = freq;
        const t = _audioCtx.currentTime + delay;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.35, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
        osc.start(t);
        osc.stop(t + 0.6);
      });
    }

    function tocarPing() {
      try {
        _criarCtx();
        if (_audioCtx.state === "suspended") {
          _audioCtx.resume().then(() => _tocarNotas()).catch(() => {});
        } else {
          _tocarNotas();
        }
      } catch {}
    }

    // Desbloqueia AudioContext em qualquer interação (clique, toque, tecla)
    ["click", "touchstart", "keydown"].forEach(ev =>
      document.addEventListener(ev, () => { _criarCtx(); _audioCtx.resume().catch(() => {}); }, { once: false, passive: true })
    );

    // ── ANIMAR DOCAS ──
    let _fsTimer = null;

    function animarDocas(idAlvo) {
      // Cancela qualquer fullscreen anterior imediatamente
      clearTimeout(_fsTimer);
      document.querySelectorAll(".dock-card.fullscreen").forEach(c =>
        c.classList.remove("fullscreen", "saindo")
      );

      const card = document.querySelector(`.dock-card[data-id="${idAlvo}"]`);
      if (!card) return;

      void card.offsetWidth; // força reflow para reiniciar animação CSS
      card.classList.add("fullscreen");

      _fsTimer = setTimeout(() => {
        card.classList.add("saindo");
        card.addEventListener("animationend", () => {
          card.classList.remove("fullscreen", "saindo");
        }, { once: true });
      }, 5000);
    }

    // ── RENDER GRID ──
    function render(estado) {
      _estadoAtual = estado;
      const docasDaPagina = TV_PAGINAS[_paginaAtual] || [];

      const grid = document.getElementById("dock-grid");
      grid.dataset.layout = String(_layout);

      const cardsHTML = docasDaPagina.map(id => {
        const d         = ((estado.docas || {})[id]) || {};
        const vazio     = !(d.motorista || "").trim();
        const statusCls = classificarStatus(d.status);
        const statusTxt = d.status || "AGUARDANDO MOTORISTA";
        const sufixo    = d.paletizada ? " · PALETIZADA" : (d.tipo ? " · NÃO PALETIZADA" : "");
        return `<article class="dock-card" data-id="${id}" data-status="${statusCls}"
                         aria-label="Doca ${id}: ${statusTxt}">
          <div class="dc-status">
            <span class="dc-dot" aria-hidden="true"></span>
            <span>${statusTxt}</span>
          </div>
          <span class="dc-numero">DOCA ${id}</span>
          ${vazio
            ? `<p class="dc-livre">DOCA LIVRE</p>`
            : `<p class="dc-motorista">${d.motorista}</p>
               <p class="dc-placa">${d.placa || ""}</p>
               <p class="dc-info">${(d.tipo || "") + sufixo}</p>`
          }
        </article>`;
      });

      // Preenche slots restantes com placeholders (ex: última página com menos docas)
      while (cardsHTML.length < _layout) {
        cardsHTML.push(`<div class="dock-card-placeholder" aria-hidden="true"></div>`);
      }

      grid.innerHTML = cardsHTML.join("");

      // Dots dinâmicos por número de páginas
      document.getElementById("tv-indicador").innerHTML =
        TV_PAGINAS.map((_, i) =>
          `<span class="pag-dot${i === _paginaAtual ? " ativo" : ""}"></span>`
        ).join("");

    }

    // ── ROTAÇÃO AUTOMÁTICA (6s por página) ──
    function iniciarRotacao() {
      setInterval(() => {
        // Não rotaciona enquanto um card está em fullscreen
        if (document.querySelector(".dock-card.fullscreen")) return;
        _paginaAtual = (_paginaAtual + 1) % TV_PAGINAS.length;
        if (_estadoAtual) render(_estadoAtual);
      }, 6000);
    }

    // ── GLOW DE ATUALIZAÇÃO ──
    function ativarGlow() {
      const el = document.getElementById("glow-overlay");
      if (!el) return;
      el.classList.remove("ativo");
      void el.offsetWidth;
      el.classList.add("ativo");
      setTimeout(() => el.classList.remove("ativo"), 2800);
    }

    // ── RELÓGIO ──
    function iniciarRelogio() {
      const el   = document.getElementById("relogio-tv");
      const tick = () => {
        el.textContent = new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
      };
      tick();
      setInterval(tick, 1000);
    }

    // ── PAINEL ──
    const isKiosk = new URLSearchParams(location.search).has("kiosk");
    let _primeiroUpdate = _firebaseAtivo;

    function iniciarPainel() {
      _estadoAtual = carregar();
      render(_estadoAtual);
      iniciarRotacao();
      inscrever((novoEstado) => {
        const anterior = _estadoAtual;
        const docasAlteradas = anterior
          ? DOCA_IDS.filter(id =>
              JSON.stringify((anterior.docas || {})[id]) !== JSON.stringify((novoEstado.docas || {})[id])
            )
          : [];

        // Se há doca alterada: vai para a página dela ANTES de renderizar
        // Isso garante que o card existe no DOM quando animarDocas rodar
        if (docasAlteradas.length > 0) {
          const idAlvo    = docasAlteradas[0];
          const paginaAlvo = TV_PAGINAS.findIndex(p => p.includes(idAlvo));
          if (paginaAlvo >= 0) _paginaAtual = paginaAlvo;
        }

        render(novoEstado);

        if (docasAlteradas.length > 0) {
          tocarPing();
          animarDocas(docasAlteradas[0]);
        }

        if (!_primeiroUpdate) ativarGlow();
        _primeiroUpdate = false;
      });
    }

    // ── AUTH (modal via botão lock) ──
    function fecharLogin() {
      document.getElementById("auth-overlay").classList.remove("visivel");
      document.getElementById("auth-usuario").value    = "";
      document.getElementById("auth-senha").value      = "";
      document.getElementById("auth-erro").textContent = "";
    }

    async function tentarLogin() {
      const usuario = document.getElementById("auth-usuario").value;
      const senha   = document.getElementById("auth-senha").value;
      const err     = document.getElementById("auth-erro");
      const tipo    = await verificarLogin(usuario, senha);
      if (tipo === "admin") {
        salvarSessao("admin");
        location.href = "controle.html";
      } else {
        err.textContent = "Usuário ou senha incorretos";
        document.getElementById("auth-senha").value = "";
        document.getElementById("auth-senha").focus();
      }
    }

    function abrirLogin() {
      document.getElementById("auth-overlay").classList.add("visivel");
      document.getElementById("auth-btn").onclick       = tentarLogin;
      document.getElementById("auth-usuario").onkeydown = (e) => { if (e.key === "Enter") document.getElementById("auth-senha").focus(); };
      document.getElementById("auth-senha").onkeydown   = (e) => { if (e.key === "Enter") tentarLogin(); };
      setTimeout(() => document.getElementById("auth-usuario").focus(), 100);
    }

    // ── INIT ──
    (function init() {
      iniciarPainel();
      iniciarRelogio();

      // Recebe mudança de layout do painel admin (mesma aba ou outro dispositivo via storage)
      try {
        const bcLayout = new BroadcastChannel("painel-layout");
        bcLayout.onmessage = (e) => { if (typeof e.data === "number") setLayout(e.data); };
      } catch {}
      window.addEventListener("storage", (e) => {
        if (e.key === "painel-layout" && e.newValue) setLayout(parseInt(e.newValue));
      });

      if (!isKiosk) {
        document.getElementById("btn-lock").addEventListener("click", abrirLogin);
        document.getElementById("auth-close").addEventListener("click", fecharLogin);
        document.getElementById("auth-overlay").addEventListener("click", (e) => {
          if (e.target === document.getElementById("auth-overlay")) fecharLogin();
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") fecharLogin();
        });
      }
    })();
  </script>
</body>
</html>
